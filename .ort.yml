excludes:
  paths:
    - pattern: ".ort/**/*"
      reason: "TEST_OF"
      comment: "This directory is not relevant."

    - pattern: ".ort.yml"
      reason: "TEST_OF"
      comment: "This file is not relevant."

    - pattern: "**/.gitignore"
      reason: "OTHER"
      comment: "This directory is not relevant."

    - pattern: ".gitattributes"
      reason: "OTHER"
      comment: "This file is not present in a release."

    - pattern: ".gitignore"
      reason: "OTHER"
      comment: "This file is not present in a release."

# Curations are used to fix wrongly detected licenses
curations:
    license_findings:
      - path: "lib/wx/src/gen/**/wx*.erl"
        reason: "INCORRECT"
        comment: >-
          Documentation was taken from wxWidgets, source code is Apache-2.0
        detected_license: "Apache-2.0"
        concluded_license: "Apache-2.0 AND LicenseRef-wxwindows-free-doc"

      - path: "lib/edoc/**"
        reason: "INCORRECT"
        comment: >-
          License mistaken by Scancode
        detected_license: "Apache-2.0 AND GPL-2.0-or-later AND LGPL-2.0-or-later"
        concluded_license: "Apache-2.0 OR LGPL-2.0-or-later"

      - path: "lib/eunit/**"
        reason: "INCORRECT"
        comment: >-
          License mistaken by Scancode
