name: Build Erlang/OTP (FreeBSD)
run-name: "[${{ inputs.base_branch }}] Build Erlang/OTP (FreeBSD)"

on:
  workflow_call:
    inputs:
      base_branch:
        required: true
        type: string

permissions:
  contents: read

# NOTE: This job should only be executed on the callee with `needs: pack`
jobs:
  freebsd:
    name: Build Erlang/OTP (FreeBSD)
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Download source archive
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: otp_prebuilt
      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@c9f815bc7aa0d34c9fdd0619b034a32d6ca7b57e # v1.4.2
        with:
            usesh: true
            copyback: false
            disable-cache: true
            prepare: |
              # Don't update base FreeBSD system, only required ports
              pkg update -fr FreeBSD-ports
              pkg upgrade -yr FreeBSD-ports
              pkg install -yr FreeBSD-ports bash gmake gtar autoconf ncurses pkgconf

            run: |
                tar -xzf ./otp_src.tar.gz
                cd otp
                export ERL_TOP=`pwd`
                export MAKEFLAGS=-j$(($(sysctl -n hw.ncpu) + 2))
                export ERLC_USE_SERVER=true
                export ERTS_SKIP_DEPEND=true
                ./configure
                gmake
