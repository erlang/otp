name: Build Erlang/OTP (FreeBSD)
run-name: "[${{ inputs.base_branch }}] Build Erlang/OTP (FreeBSD)"

on:
  workflow_call:
    inputs:
      base_branch:
        required: true
        type: string

# NOTE: This job should only be executed on the callee with `needs: pack`
jobs:
  freebsd:
    name: Build Erlang/OTP (FreeBSD)
    runs-on: ubuntu-latest
    steps:
      - name: Download source archive
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: otp_prebuilt
      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@c9f815bc7aa0d34c9fdd0619b034a32d6ca7b57e # v1
        with:
            usesh: true
            copyback: false
            prepare: |
              pkg update
              pkg upgrade -y
              pkg install -y bash gmake gtar autoconf ncurses pkgconf

            run: |
                tar -xzf ./otp_src.tar.gz
                cd otp
                export ERL_TOP=`pwd`
                export MAKEFLAGS=-j$(($(nproc) + 2))
                export ERLC_USE_SERVER=true
                export ERTS_SKIP_DEPEND=true
                ./configure
                gmake
